spring.application.name=attendance-control
server.port=${PORT:8080}
app.base-url=${APP_BASE_URL}
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

spring.datasource.url=jdbc:postgresql://${DB_URL}:5432/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${DB_DDL}
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=8h
server.servlet.session.cookie.same-site=strict

logging.level.org.springframework=WARN
logging.level.com.elias.attendancecontrol=INFO

qr.duration-minutes=${QR_DURATION_MINUTES:1}
qr.default-width=300
qr.default-height=300

scheduler.qr-regeneration.fixed-rate.ms=${SCHEDULER_QR_RATE_MS:60000}
scheduler.activity-completion.cron=${SCHEDULER_ACTIVITY_CRON:0 0 2 * * ?}

session-token.duration-hours=${SESSION_TOKEN_HOURS:2}
security.max-sessions-per-user=${MAX_SESSIONS_PER_USER:1}
security.session-prevents-login=false
security.bcrypt-strength=${BCRYPT_STRENGTH:10}

organization.plan.free.max-users=50
organization.plan.free.max-activities=10
organization.plan.basic.max-users=200
organization.plan.basic.max-activities=50
organization.plan.premium.max-users=1000
organization.plan.premium.max-activities=200


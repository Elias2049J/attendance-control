<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Gestionar Organizaciones')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
                    <nav aria-label="breadcrumb" class="d-none d-md-block">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Organizaciones</li>
                        </ol>
                    </nav>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h3">
                            <i class="bi bi-buildings"></i>
                            Gestionar Organizaciones
                        </h1>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle-fill"></i>
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div class="row g-4">
                        <div class="col-md-6 col-lg-4" th:each="org : ${organizations}">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <div class="d-flex align-items-start justify-content-between mb-3">
                                        <div>
                                            <h5 class="card-title mb-1" th:text="${org.name}">Nombre Org</h5>
                                            <small class="text-muted" th:text="'@' + ${org.slug}">@slug</small>
                                        </div>
                                        <span th:if="${org.active}" class="badge">Activa</span>
                                        <span th:unless="${org.active}" class="badge bg-secondary">Inactiva</span>
                                    </div>
                                    <div class="mb-3">
                                        <span class="badge" th:text="${org.plan.displayName}">PLAN</span>
                                    </div>
                                    <div class="d-flex justify-content-between text-muted small mb-3">
                                        <div>
                                            <i class="bi bi-people"></i>
                                            <span th:text="${org.maxUsers} + ' usuarios'">0 usuarios</span>
                                        </div>
                                        <div>
                                            <i class="bi bi-calendar-event"></i>
                                            <span th:text="${org.maxActivities} + ' actividades'">0 actividades</span>
                                        </div>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <a th:href="@{/organizations/{slug}/admin/edit(slug=${org.slug})}"
                                           class="btn btn-primary btn-sm">
                                            <i class="bi bi-shield-lock"></i>
                                            Administrar
                                        </a>
                                        <a th:href="@{/organizations/{slug}/members(slug=${org.slug})}"
                                           class="btn btn-outline-secondary btn-sm">
                                            <i class="bi bi-people"></i>
                                            Ver Miembros
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(organizations)}" class="col-12">
                            <div class="alert alert-info text-center">
                                <i class="bi bi-info-circle fs-1"></i>
                                <p class="mt-3 mb-0">No hay organizaciones registradas</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
    <div th:replace="~{layout :: mobileNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

﻿<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Mi Organización</li>
                </ol>
            </nav>
            <h2><i class="bi bi-building"></i> <span th:text="${organization.name}">Organización</span></h2>
            <p class="text-muted" th:text="${organization.description}">Descripción</p>
            <div class="row mt-4">
                <div class="col-md-3 mb-3">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-people fs-1 text-mirae-green"></i>
                            <h3 class="mt-2" th:text="${stats.totalMembers}">0</h3>
                            <p class="text-muted mb-0">Total Miembros</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-person-badge fs-1 text-mirae-green"></i>
                            <h3 class="mt-2" th:text="${stats.adminCount}">0</h3>
                            <p class="text-muted mb-0">Administradores</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-list-task fs-1 text-mirae-green"></i>
                            <h3 class="mt-2" th:text="${stats.activeActivities}">0</h3>
                            <p class="text-muted mb-0">Actividades Activas</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-calendar-check fs-1 text-mirae-dark"></i>
                            <h3 class="mt-2" th:text="${stats.scheduledSessions}">0</h3>
                            <p class="text-muted mb-0">Sesiones Pendientes</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-md-6 mb-3">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Información</h5>
                        </div>
                        <div class="card-body">
                            <p><strong>Plan:</strong> <span class="badge bg-info" th:text="${organization.plan}">Plan</span></p>
                            <p><strong>Email:</strong> <span th:text="${organization.contactEmail}">Email</span></p>
                            <p><strong>Teléfono:</strong> <span th:text="${organization.phone}">Teléfono</span></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card shadow">
                        <div class="card-header bg-secondary text-white">
                            <h5 class="mb-0">Acciones Rápidas</h5>
                        </div>
                        <div class="card-body">
                            <a th:href="@{/organizations/settings}" class="btn btn-outline-primary d-block mb-2">
                                <i class="bi bi-gear"></i> Configurar Organización
                            </a>
                            <a th:href="@{/users}" class="btn btn-outline-secondary d-block mb-2"
                               sec:authorize="hasAnyRole('ORG_OWNER', 'ORG_ADMIN')">
                                <i class="bi bi-people"></i> Gestionar Miembros
                            </a>
                            <a th:href="@{/activities}" class="btn btn-outline-success d-block">
                                <i class="bi bi-list-task"></i> Ver Actividades
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

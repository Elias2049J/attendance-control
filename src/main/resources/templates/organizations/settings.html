<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Configuración')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
            <h2><i class="bi bi-gear"></i> Configuración de Organización</h2>
            <div class="row mt-4">
                <div class="col-lg-8">
                    <div class="card shadow">
                        <div class="card-body">
                            <form th:action="@{/organizations/update}" method="post" th:object="${organization}">
                                <input type="hidden" th:field="*{id}">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Nombre de la Organización *</label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="description" class="form-label">Descripción</label>
                                    <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="contactEmail" class="form-label">Email de Contacto</label>
                                        <input type="email" class="form-control" id="contactEmail" th:field="*{contactEmail}">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="phone" class="form-label">Teléfono</label>
                                        <input type="tel" class="form-control" id="phone" th:field="*{phone}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="address" class="form-label">Dirección</label>
                                    <input type="text" class="form-control" id="address" th:field="*{address}">
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <a th:href="@{/organizations/dashboard}" class="btn btn-secondary">
                                        <i class="bi bi-x-circle"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle"></i> Guardar Cambios
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

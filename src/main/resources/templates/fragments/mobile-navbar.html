<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav th:fragment="bottomNav" class="mobile-bottom-navbar fixed-bottom bg-white border-top d-md-none">
        <div class="mobile-nav-scroll">
            <div class="mobile-nav-items">
                <a th:href="@{/}" th:class="'mobile-nav-item' + ${activeMenu == 'home' ? ' active' : ''}">
                    <i class="bi bi-house-door"></i>
                    <small>Inicio</small>
                </a>
                <a th:href="@{/activities}" th:class="'mobile-nav-item' + ${activeMenu == 'activities' ? ' active' : ''}">
                    <i class="bi bi-list-task"></i>
                    <small>Actividades</small>
                </a>
                <a th:href="@{/calendar}" th:class="'mobile-nav-item' + ${activeMenu == 'calendar' ? ' active' : ''}">
                    <i class="bi bi-calendar3"></i>
                    <small>Calendario</small>
                </a>
                <a th:href="@{/organizations/dashboard}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations' ? ' active' : ''}"
                   sec:authorize="hasAnyRole('ORG_OWNER', 'ORG_ADMIN')">
                    <i class="bi bi-building"></i>
                    <small>Mi Org</small>
                </a>
                <a th:href="@{/organizations}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations-list' ? ' active' : ''}"
                   th:if="${isSysAdmin}">
                    <i class="bi bi-buildings"></i>
                    <small>Organizaciones</small>
                </a>
                <a th:href="@{/reports}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'reports' ? ' active' : ''}"
                   sec:authorize="hasAnyRole('ADMIN', 'ORG_OWNER', 'ORG_ADMIN')">
                    <i class="bi bi-graph-up"></i>
                    <small>Reportes</small>
                </a>
                <a th:href="@{/profile}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'profile' ? ' active' : ''}">
                    <i class="bi bi-person-circle"></i>
                    <small>Mi Perfil</small>
                </a>
            </div>
        </div>
    </nav>
</body>
</html>

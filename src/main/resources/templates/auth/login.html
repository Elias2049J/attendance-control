<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - MIRAE</title>
    <link th:href="@{/css/bootstrap.css}" rel="stylesheet">
    <link th:href="@{/bootstrap-icons-1.13.1/bootstrap-icons.min.css}" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <style>
        .login-main {
            min-width: 400px;
            max-width: 480px;
            width: 33.33%;
        }
        .login-aside {
            width: 66.66%;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .login-main {
                width: 100%;
                max-width: 100vw;
                min-width: 0;
            }
            .login-aside {
                display: none !important;
            }
        }
        .login-aside-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 1;
        }
        .login-aside-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background: rgba(255,255,255,0.92);
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 2.5rem 2rem;
            max-width: 420px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-light">
    <div id="app" class="min-vh-100 d-flex flex-row">
        <aside class="login-aside d-none d-md-flex flex-1 flex-column login-bg login-etxra">
            <img src="/login.png" alt="Login" class="login-aside-img">
            <div class="login-aside-text card shadow-lg border-0 rounded-4 p-4 mx-auto">
                <div class="card-body d-flex flex-column align-items-center justify-content-center">
                    <i class="bi bi-question-circle display-3 text-primary mb-3"></i>
                    <p class="fs-5 text-dark mb-0 text-center">
                        Si tienes problemas para iniciar sesión, por favor contacta al administrador de tu organización para recibir asistencia.
                    </p>
                </div>
            </div>
        </aside>
        <main class="login-main self-center p-5 mx-auto d-flex flex-column justify-content-center">
            <div class="d-flex justify-content-center align-items-center mb-3">
                <img src="/favicon.ico" alt="Logo MIRAE" style="width:80px;">
                <span class="ms-3 fw-bold display-4 text-mirae-dark">MIRAE</span>
            </div>
            <div class="text-neutral">
                <div class="text-center py-2 fw-bold">Iniciar Sesión</div>
                <form th:action="@{/auth/login}" method="post">
                    <div class="mb-2 d-grid">
                        <label for="username" class="form-label text-sm fw-semibold">
                            <i class="bi bi-person me-1"></i>Usuario
                        </label>
                        <input type="text" class="form-control form-control-sm w-100 py-2" id="username" name="username" placeholder="Ingrese su usuario" required autofocus autocomplete="username">
                    </div>
                    <div class="mb-3 d-grid">
                        <label for="password" class="form-label text-sm fw-semibold">
                            <i class="bi bi-lock me-1"></i>Contraseña
                        </label>
                        <input type="password" class="form-control form-control-sm w-100 py-2" id="password" name="password" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                    </div>
                    <div class="mb-3 w-100">
                        <div class="d-flex align-items-center">
                            <input type="checkbox" class="form-check-input me-2" id="remember" name="remember">
                            <label for="remember" class="form-check-label text-sm mb-0">Recordar sesión</label>
                        </div>
                    </div>
                    <button type="submit" class="mt-3 btn btn-primary w-100 py-2 text-sm fw-bold">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar
                    </button>
                    <div class="text-center mt-3">
                        <a class="text-sm" href="#">¿Olvidó su contraseña?</a>
                    </div>
                    <div class="text-center mt-3">
                        <span class="text-sm">¿No tienes una cuenta?</span>
                        <div class="d-grid mt-2">
                            <a th:href="@{/organizations/register}" class="btn btn-outline-success btn-sm">
                                <i class="bi bi-building-add"></i> Registrar Organización
                            </a>
                        </div>
                    </div>
                </form>
            </div>
            <div class="container mx-auto text-center text-xs mt-5 text-muted">
                <small>&copy; 2026 MIRAE - Sistema de Control de Asistencia</small>
            </div>
        </main>
    </div>
    <script th:src="@{/js/bootstrap.bundle.js}" src="/js/bootstrap.bundle.js"></script>
</body>
</html>

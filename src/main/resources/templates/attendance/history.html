<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Historial de Asistencias')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content"><div class="container-fluid py-4">
        <h2><i class="bi bi-clock-history"></i> Historial de Asistencias</h2>
        <p class="text-muted">Registro histórico de asistencias</p>
        <hr>
        <div class="card mb-3">
            <div class="card-body">
                <form method="get" th:action="@{/attendance/history}" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Usuario</label>
                        <select class="form-select" name="userId">
                            <option value="">Todos</option>
                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.name + ' ' + user.lastname}"
                                    th:selected="${selectedUserId == user.id}">Usuario</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Actividad</label>
                        <select class="form-select" name="activityId">
                            <option value="">Todas</option>
                            <option th:each="activity : ${activities}"
                                    th:value="${activity.id}"
                                    th:text="${activity.name}"
                                    th:selected="${selectedActivityId == activity.id}">Actividad</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Fecha Fin</label>
                        <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i> Filtrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha/Hora</th>
                                <th>Usuario</th>
                                <th>Actividad</th>
                                <th>Sesión</th>
                                <th>Tipo Registro</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attendance : ${attendances}">
                                <td>
                                    <small th:text="${#temporals.format(attendance.registrationTime, 'dd/MM/yyyy HH:mm')}"></small>
                                </td>
                                <td>
                                    <i class="bi bi-person-circle"></i>
                                    <span th:text="${attendance.user.name + ' ' + attendance.user.lastname}"></span>
                                </td>
                                <td>
                                    <strong th:text="${attendance.session.activity.name}"></strong>
                                </td>
                                <td>
                                    <small th:text="${#temporals.format(attendance.session.sessionDate, 'dd/MM/yyyy')}"></small>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${attendance.registrationType == 'QR'} ? 'bg-info' : 'bg-warning'"
                                          th:text="${attendance.registrationType}">QR</span>
                                </td>
                                <td>
                                    <span th:if="${attendance.status.name() == 'PRESENT'}"
                                          class="badge bg-success">
                                        <i class="bi bi-check-circle"></i> Presente
                                    </span>
                                    <span th:if="${attendance.status.name() == 'LATE'}"
                                          class="badge bg-warning">
                                        <i class="bi bi-clock"></i> Tarde
                                    </span>
                                    <span th:if="${attendance.status.name() == 'ABSENT'}"
                                          class="badge bg-danger">
                                        <i class="bi bi-x-circle"></i> Ausente
                                    </span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(attendances)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No hay registros de asistencia para los filtros seleccionados
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{/attendance}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Volver a Registro
            </a>
        </div>
    </div></main><div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

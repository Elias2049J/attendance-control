<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Sesiones')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content"><div class="container-fluid py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item active" aria-current="page">Sesiones</li>
            </ol>
        </nav>
        <h2><i class="bi bi-clock-history"></i> Gestión de Sesiones</h2>
        <p class="text-muted">Administrar sesiones de actividades</p>
        <hr>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha</th>
                                <th>Actividad</th>
                                <th>Horario</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="sessionEntity : ${sessions}">
                                <td>
                                    <i class="bi bi-calendar-date"></i>
                                    <span th:text="${#temporals.format(sessionEntity.sessionDate, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td><strong th:text="${sessionEntity.activity.name}"></strong></td>
                                <td>
                                    <span th:text="${#temporals.format(sessionEntity.startTime, 'HH:mm')}"></span>
                                    -
                                    <span th:text="${#temporals.format(sessionEntity.endTime, 'HH:mm')}"></span>
                                </td>
                                <td>
                                    <span th:if="${sessionEntity.status.name() == 'PLANNED'}" class="badge bg-primary">Planificada</span>
                                    <span th:if="${sessionEntity.status.name() == 'ACTIVE'}" class="badge bg-success">Activa</span>
                                    <span th:if="${sessionEntity.status.name() == 'CLOSED'}" class="badge bg-secondary">Cerrada</span>
                                    <span th:if="${sessionEntity.status.name() == 'CANCELLED'}" class="badge bg-danger">Cancelada</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <form th:if="${sessionEntity.status.name() == 'PLANNED'}"
                                              th:action="@{/sessions/{id}/activate(id=${sessionEntity.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-success" title="Activar">
                                                <i class="bi bi-play-circle"></i>
                                            </button>
                                        </form>
                                        <a th:if="${sessionEntity.status.name() == 'ACTIVE'}"
                                           th:href="@{/qr/generate/{id}(id=${sessionEntity.id})}"
                                           class="btn btn-outline-info" title="Generar QR">
                                            <i class="bi bi-qr-code"></i>
                                        </a>
                                        <a th:if="${sessionEntity.status.name() == 'ACTIVE'}"
                                           th:href="@{/attendance/manual/{id}(id=${sessionEntity.id})}"
                                           class="btn btn-outline-primary" title="Registrar Asistencias">
                                            <i class="bi bi-clipboard-check"></i>
                                        </a>
                                        <form th:if="${sessionEntity.status.name() == 'ACTIVE'}"
                                              th:action="@{/sessions/{id}/close(id=${sessionEntity.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-secondary" title="Cerrar">
                                                <i class="bi bi-stop-circle"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sessions)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No hay sesiones programadas
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div></main><div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

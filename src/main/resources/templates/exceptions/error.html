<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Error')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <div class="container mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white text-center">
                        <h2 class="mb-0">
                            <i class="bi bi-exclamation-triangle fs-1"></i>
                        </h2>
                        <h3>¡Ups! Ocurrió un Error</h3>
                    </div>
                    <div class="card-body text-center">
                        <div class="mb-4">
                            <h4 class="text-danger" th:text="${error ?: 'Error inesperado'}">Error</h4>
                            <p class="text-muted" th:text="${message ?: 'Ha ocurrido un error inesperado en el sistema'}">Mensaje</p>
                        </div>
                        <div th:if="${status}" class="mb-3">
                            <p class="mb-1"><strong>Código de Estado:</strong></p>
                            <span class="badge bg-danger fs-5" th:text="${status}">500</span>
                        </div>
                        <div th:if="${timestamp}" class="mb-3">
                            <p class="mb-1 text-muted"><small>Fecha del error:</small></p>
                            <small th:text="${#temporals.format(timestamp, 'dd/MM/yyyy HH:mm:ss')}">Timestamp</small>
                        </div>
                        <div th:if="${path}" class="mb-4">
                            <p class="mb-1 text-muted"><small>Ruta:</small></p>
                            <code th:text="${path}">/path</code>
                        </div>
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i>
                            Si el problema persiste, contacte al administrador del sistema.
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <button onclick="history.back()" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Volver Atrás
                            </button>
                            <a th:href="@{/}" class="btn btn-primary">
                                <i class="bi bi-house"></i> Ir al Inicio
                            </a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <p class="text-muted">
                        <i class="bi bi-headset"></i>
                        ¿Necesitas ayuda? Contacta al soporte técnico
                    </p>
                </div>
            </div>
        </div>
    </div></main><div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

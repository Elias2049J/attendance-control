<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Editar Perfil')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
            <h2><i class="bi bi-pencil"></i> Editar Perfil</h2>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row mt-4">
                <div class="col-lg-8">
                    <div class="card shadow">
                        <div class="card-body">
                            <form th:action="@{/profile/update}" method="post" th:object="${user}">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="name" class="form-label">Nombre *</label>
                                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="lastname" class="form-label">Apellido *</label>
                                        <input type="text" class="form-control" id="lastname" th:field="*{lastname}" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Nueva Contraseña</label>
                                    <input type="password" class="form-control" id="password" th:field="*{password}"
                                           placeholder="Dejar en blanco para mantener la actual">
                                    <small class="form-text text-muted">Mínimo 8 caracteres si desea cambiarla</small>
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <a th:href="@{/profile}" class="btn btn-secondary">
                                        <i class="bi bi-x-circle"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle"></i> Guardar Cambios
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Cancelar Sesión')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content"><div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-x-circle"></i> Cancelar Sesión
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i>
                            <strong>Actividad:</strong> <span th:text="${activity.name}"></span>
                        </div>
                        <form th:action="@{/incidents/cancel}" method="post">
                            <input type="hidden" name="activityId" th:value="${activity.id}">
                            <div class="mb-3">
                                <label for="date" class="form-label">Sesión a cancelar</label>
                                <select class="form-select" id="date" name="date" required>
                                    <option value="">Seleccione una sesión...</option>
                                    <option th:each="sessionEntity : ${sessions}"
                                            th:if="${sessionEntity.status.name() == 'PLANNED'}"
                                            th:value="${sessionEntity.sessionDate}"
                                            th:text="${#temporals.format(sessionEntity.sessionDate, 'dd/MM/yyyy') + ' - ' + #temporals.format(sessionEntity.startTime, 'HH:mm')}">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="reason" class="form-label">Motivo de la cancelación</label>
                                <textarea class="form-control" id="reason" name="reason" rows="3" required></textarea>
                            </div>
                            <div class="alert alert-warning">
                                <i class="bi bi-exclamation-triangle"></i>
                                <strong>Advertencia:</strong> Esta acción no se puede deshacer. La sesión quedará marcada como cancelada.
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/activities}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Volver
                                </a>
                                <button type="submit" class="btn btn-danger">
                                    <i class="bi bi-x-circle"></i> Confirmar Cancelación
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div></main><div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Gestión de Incidencias')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content"><div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2><i class="bi bi-exclamation-triangle"></i> Gestión de Incidencias</h2>
                <p class="text-muted">Historial de reprogramaciones y cancelaciones</p>
            </div>
            <a th:href="@{/activities}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver a Actividades
            </a>
        </div>
        <hr>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha</th>
                                <th>Actividad</th>
                                <th>Tipo</th>
                                <th>Sesión Afectada</th>
                                <th>Motivo</th>
                                <th>Registrado por</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="incident : ${incidents}">
                                <td th:text="${#temporals.format(incident.incidentDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td><strong th:text="${incident.activity.name}"></strong></td>
                                <td>
                                    <span th:if="${incident.incidentType.name() == 'CANCELLATION'}" class="badge bg-danger">
                                        <i class="bi bi-x-circle"></i> Cancelación
                                    </span>
                                    <span th:if="${incident.incidentType.name() == 'RESCHEDULING'}" class="badge bg-warning">
                                        <i class="bi bi-calendar-x"></i> Reprogramación
                                    </span>
                                    <span th:if="${incident.incidentType.name() == 'LOCATION_CHANGE'}" class="badge bg-info">
                                        <i class="bi bi-geo-alt"></i> Cambio de lugar
                                    </span>
                                    <span th:if="${incident.incidentType.name() == 'OTHER'}" class="badge bg-secondary">
                                        <i class="bi bi-info-circle"></i> Otro
                                    </span>
                                </td>
                                <td th:text="${(incident.affectedSession != null and incident.affectedSession.sessionDate != null) ? #temporals.format(incident.affectedSession.sessionDate, 'dd/MM/yyyy') : 'N/A'}"></td>
                                <td>
                                    <small th:text="${incident.reason}"></small>
                                </td>
                                <td>
                                    <i class="bi bi-person"></i>
                                    <span th:text="${(incident.createdByUser != null) ? incident.createdByUser.username : 'Sistema'}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/incidents/{id}(id=${incident.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Ver detalle">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(incidents)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No hay incidencias registradas
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div></main><div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>

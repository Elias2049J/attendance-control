<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Gestión de Usuarios')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/sidebar-navbar :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item active" aria-current="page">Usuarios</li>
            </ol>
        </nav>
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2><i class="bi bi-people"></i> Gestión de Usuarios</h2>
                        <p class="text-muted">Administrar usuarios del sistema</p>
                    </div>
                    <div>
                        <a th:href="@{/users/new}" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Nuevo Usuario
                        </a>
                    </div>
                </div>
                <hr>
            </div>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" systemRole="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${success}">Operación exitosa</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" systemRole="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${error}">Error en la operación</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:replace="~{fragments/user-search :: searchForm}"></div>
        </div>
    </main>
    <div th:replace="~{fragments/mobile-navbar :: bottomNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
    <script th:replace="~{fragments/user-search :: searchScript}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Inicio')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
            <h2><i class="bi bi-house-door"></i> Bienvenido, <span th:text="${username}">Usuario</span></h2>
            <p class="text-muted">Panel principal del sistema</p>
            <div class="row mt-4">
                <div class="col-md-3 mb-3" th:if="${isOrgOwnerOrAdmin or isSystemAdmin}">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-people fs-1 text-mirae-green"></i>
                            <h5 class="card-title mt-3">Usuarios</h5>
                            <p class="card-text display-4" th:text="${totalUsers ?: 0}">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-list-task fs-1 text-mirae-green"></i>
                            <h5 class="card-title mt-3">Actividades</h5>
                            <p class="card-text display-4" th:text="${totalActivities ?: 0}">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3" th:if="${isOrgOwnerOrAdmin or isSystemAdmin}">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-calendar-event fs-1 text-mirae-green"></i>
                            <h5 class="card-title mt-3">Sesiones</h5>
                            <p class="card-text display-4" th:text="${totalSessions ?: 0}">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3" th:unless="${isSystemAdmin}">
                    <div class="card text-center shadow stat-card">
                        <div class="card-body">
                            <i class="bi bi-building fs-1 text-mirae-dark"></i>
                            <p class="card-text h5" th:text="${(organization != null and organization.name != null) ? organization.name : 'N/A'}">Organización</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mt-4" th:if="${isOrgOwnerOrAdmin == true or isOrgMember == true and activities != null && !#lists.isEmpty(activities)}">
                <div class="col-12">
                    <h4><i class="bi bi-list-task"></i> Mis Actividades Recientes</h4>
                    <div class="row g-2 mt-2">
                        <div th:each="activity, iterStat : ${activities}" th:if="${iterStat.index < 6}" class="col-12">
                            <a th:href="@{/activities/{id}(id=${activity.id})}" class="text-decoration-none">
                                <div class="card activity-card shadow-sm">
                                    <div class="card-body py-2 px-3">
                                        <div class="d-flex align-items-center">
                                            <div class="flex-grow-1">
                                                <h6 class="mb-1 fw-bold" th:text="${activity.name}">Actividad</h6>
                                                <p class="mb-1 text-muted small" th:text="${activity.description}" style="line-height: 1.3;">Descripción</p>
                                                <div class="mt-1">
                                                    <small class="text-muted">
                                                        <i class="bi bi-circle-fill" style="font-size: 0.4rem;"></i>
                                                        <span th:text="${activity.status.displayName}">Estado</span>
                                                    </small>
                                                </div>
                                            </div>
                                            <div class="ms-2">
                                                <i class="bi bi-chevron-right text-muted"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Sección A Cargo -->
            <div class="row mt-4" th:if="${responsibleActivities != null && !#lists.isEmpty(responsibleActivities)}">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-person-badge"></i> A Cargo</h5>
                    <div class="row g-2">
                        <div th:each="activity : ${responsibleActivities}" class="col-12">
                            <a th:href="@{/activities/{id}(id=${activity.id})}" class="text-decoration-none">
                                <div class="card activity-card shadow-sm">
                                    <div class="card-body py-2 px-3">
                                        <div class="d-flex align-items-center">
                                            <div class="flex-grow-1">
                                                <h6 class="mb-1 fw-bold" th:text="${activity.name}">Actividad</h6>
                                                <p class="mb-1 text-muted small" th:text="${activity.description}" style="line-height: 1.3;">Descripción</p>
                                                <div class="mt-1">
                                                    <small class="text-muted">
                                                        <i class="bi bi-circle-fill" style="font-size: 0.4rem;"></i>
                                                        <span th:text="${activity.status.displayName}">Estado</span>
                                                    </small>
                                                </div>
                                            </div>
                                            <div class="ms-2">
                                                <i class="bi bi-chevron-right text-muted"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Sección Inscrito -->
            <div class="row mt-4" th:if="${enrolledActivities != null && !#lists.isEmpty(enrolledActivities)}">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-person-check"></i> Inscrito</h5>
                    <div class="row g-2">
                        <div th:each="activity : ${enrolledActivities}" class="col-12">
                            <a th:href="@{/activities/{id}(id=${activity.id})}" class="text-decoration-none">
                                <div class="card activity-card shadow-sm">
                                    <div class="card-body py-2 px-3">
                                        <div class="d-flex align-items-center">
                                            <div class="flex-grow-1">
                                                <h6 class="mb-1 fw-bold" th:text="${activity.name}">Actividad</h6>
                                                <p class="mb-1 text-muted small" th:text="${activity.description}" style="line-height: 1.3;">Descripción</p>
                                                <div class="mt-1">
                                                    <small class="text-muted">
                                                        <i class="bi bi-circle-fill" style="font-size: 0.4rem;"></i>
                                                        <span th:text="${activity.status.displayName}">Estado</span>
                                                    </small>
                                                </div>
                                            </div>
                                            <div class="ms-2">
                                                <i class="bi bi-chevron-right text-muted"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{layout :: mobileNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
